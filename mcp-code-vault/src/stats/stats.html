<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCP Code Vault - Stats</title>
  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen text-gray-100">
  <div id="app" class="max-w-5xl mx-auto py-8 px-4">
    <h1 class="text-3xl font-bold mb-6">MCP Code Vault - Stats</h1>
    <div class="grid gap-6">
      <div class="bg-gray-800 rounded-lg p-6">
        <h2 class="text-xl font-semibold mb-2">Health</h2>
        <pre class="text-sm overflow-auto">{{ JSON.stringify(health, null, 2) }}</pre>
      </div>
      <div class="bg-gray-800 rounded-lg p-6">
        <h2 class="text-xl font-semibold mb-2">Metrics</h2>
        <pre class="text-sm overflow-auto">{{ JSON.stringify(metrics, null, 2) }}</pre>
      </div>
      <div class="bg-gray-800 rounded-lg p-6">
        <h2 class="text-xl font-semibold mb-2">Stream: {{ streamStatus }}</h2>
        <pre class="text-sm overflow-auto max-h-40">{{ lastStreamEvent }}</pre>
      </div>
    </div>
    <nav class="mt-8 flex gap-4">
      <a href="/stats" class="text-purple-400 hover:underline">Stats</a>
      <a href="/config" class="text-purple-400 hover:underline">Config</a>
      <a href="/docs" class="text-purple-400 hover:underline">Docs</a>
    </nav>
  </div>
  <script>
    const { createApp } = Vue;
    createApp({
      data() {
        return {
          health: {},
          metrics: {},
          streamStatus: 'disconnected',
          lastStreamEvent: ''
        };
      },
      mounted() {
        this.fetchHealth();
        this.fetchMetrics();
        this.connectStream();
      },
      methods: {
        async fetchHealth() {
          try {
            const r = await fetch('/health');
            this.health = await r.json();
          } catch (e) { this.health = { error: String(e) }; }
        },
        async fetchMetrics() {
          try {
            const r = await fetch('/metrics');
            this.metrics = await r.json();
          } catch (e) { this.metrics = { error: String(e) }; }
        },
        connectStream() {
          const es = new EventSource('/metrics/stream');
          es.onopen = () => { this.streamStatus = 'connected'; };
          es.onmessage = (e) => {
            this.lastStreamEvent = e.data;
          };
          es.onerror = () => { this.streamStatus = 'error'; };
        }
      }
    }).mount('#app');
  </script>
</body>
</html>
